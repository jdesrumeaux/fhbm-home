<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Late Tracker — FHBM</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0f11;--paper:#f5f3ef;--cream:#edeae3;--tan:#ddd8cd;
  --mid:#8a8378;--ghost:#b8b2a8;--accent:#1a3a5c;--gold:#8b6914;
  --white:#ffffff;--r:8px;--red:#c0392b;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;--serif:'Instrument Serif',Georgia,serif;
}
[data-theme="dark"]{
  --ink:#e8e6e1;--paper:#0f1117;--cream:#1a1d27;--tan:#2a2d3a;
  --mid:#7a7a8a;--ghost:#4a4a5a;--accent:#5b8fd4;--gold:#c9a84c;--white:#1a1d27;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh}
.page-wrap{max-width:760px;margin:0 auto;padding:36px 24px 60px}
.theme-toggle{position:fixed;top:16px;right:16px;z-index:200;background:var(--cream);border:1px solid var(--tan);border-radius:20px;padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--mid);cursor:pointer;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--mid);text-decoration:none;margin-bottom:20px;}
.back-link:hover{color:var(--accent)}
.brand-row{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.brand-mark{width:44px;height:44px;border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-name{font-family:var(--serif);font-size:26px;font-style:italic;letter-spacing:-.02em;line-height:1}
.brand-sub{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-top:2px}
.card{background:var(--white);border:1px solid var(--tan);border-radius:12px;padding:20px 22px;margin-bottom:14px}
.card-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.month-pill{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--cream);padding:3px 10px;border-radius:20px}
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-row input{flex:1;background:var(--paper);border:1px solid var(--tan);border-radius:var(--r);padding:9px 11px;font-family:var(--mono);font-size:13px;color:var(--ink);outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row button{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-family:var(--mono);font-size:12px;cursor:pointer}
.add-row button:hover{opacity:.88}
.staff-list{display:flex;flex-direction:column;gap:2px}
.staff-row{display:flex;align-items:center;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--cream)}
.staff-row:last-child{border-bottom:none}
.staff-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px}
.staff-count{font-family:var(--mono);font-size:11px;color:var(--mid);background:var(--cream);padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}
.staff-count.has-late{color:var(--red);background:rgba(192,57,43,.1)}
.staff-actions{display:flex;align-items:center;gap:10px}
.late-checkbox{width:22px;height:22px;border:2px solid var(--tan);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--paper)}
.late-checkbox.checked{background:var(--red);border-color:var(--red)}
.late-checkbox.checked::after{content:'✓';color:white;font-size:13px;font-weight:700}
.btn-del{background:transparent;border:none;color:var(--ghost);font-size:14px;cursor:pointer;padding:2px 6px;}
.btn-del:hover{color:var(--red)}
.empty-state{text-align:center;padding:30px;color:var(--mid)}
.history-toggle{font-family:var(--mono);font-size:10px;color:var(--mid);cursor:pointer;text-decoration:underline;margin-top:2px}
.history-list{font-family:var(--mono);font-size:10px;color:var(--mid);margin-top:6px;padding-left:4px;display:none}
.history-list.show{display:block}
.history-list span{display:inline-block;background:var(--cream);padding:2px 6px;border-radius:4px;margin:2px 3px 0 0}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
<div class="page-wrap">
  <a class="back-link" href="index.html">← Home</a>
  <header class="brand-row">
    <div class="brand-mark">⏰</div>
    <div>
      <div class="brand-name">FHBM</div>
      <div class="brand-sub">Late Tracker</div>
    </div>
  </header>

  <section class="card">
    <div class="card-label">
      <span>Add staff member</span>
    </div>
    <div class="add-row">
      <input type="text" id="newName" placeholder="First name…" onkeydown="if(event.key==='Enter')addStaff()">
      <button onclick="addStaff()">+ Add</button>
    </div>
  </section>

  <section class="card">
    <div class="card-label">
      <span>Staff</span>
      <span class="month-pill" id="monthPill"></span>
    </div>
    <div class="staff-list" id="staffList"></div>
  </section>
</div>

<script>
const DEFAULT_NAMES=['Andrea','Ara','Aranya','Bimsara','Charlotte','Clarissa','Facundo','Fionna','Ingred','Jasmine','Jenny','Jeylan','Jonathan','Josep','Louise','Mapi','Maria','Mine','Mookky','Nathaly','Navapan','Parichat','Raina','Rena','Seoyeong','Siena','Taiane','Tanzal','Xiao','Yu'];

function monthKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }

function loadData(){
  let names, late;
  try{ names=JSON.parse(localStorage.getItem('fhbm_late_names')||'null'); }catch(e){ names=null; }
  if(!names) names=[...DEFAULT_NAMES];
  try{ late=JSON.parse(localStorage.getItem('fhbm_late_records')||'{}'); }catch(e){ late={}; }
  return {names, late};
}
function saveNames(names){ try{localStorage.setItem('fhbm_late_names',JSON.stringify(names));}catch(e){} }
function saveLate(late){ try{localStorage.setItem('fhbm_late_records',JSON.stringify(late));}catch(e){} }

let state=loadData();

function addStaff(){
  const input=document.getElementById('newName');
  const name=input.value.trim();
  if(!name) return;
  if(state.names.includes(name)){ input.value=''; return; }
  state.names.push(name);
  state.names.sort((a,b)=>a.localeCompare(b));
  saveNames(state.names);
  input.value='';
  render();
}

function removeStaff(name){
  if(!confirm('Remove '+name+' from the list?')) return;
  state.names=state.names.filter(n=>n!==name);
  saveNames(state.names);
  render();
}

function toggleLate(name){
  const mk=monthKey();
  const today=todayStr();
  if(!state.late[mk]) state.late[mk]={};
  if(!state.late[mk][name]) state.late[mk][name]=[];
  const idx=state.late[mk][name].indexOf(today);
  if(idx>=0){
    state.late[mk][name].splice(idx,1);
  } else {
    state.late[mk][name].push(today);
  }
  saveLate(state.late);
  render();
}

function toggleHistory(name){
  const el=document.getElementById('hist-'+name.replace(/[^a-zA-Z0-9]/g,''));
  if(el) el.classList.toggle('show');
}

function render(){
  const mk=monthKey();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now=new Date();
  document.getElementById('monthPill').textContent=monthNames[now.getMonth()]+' '+now.getFullYear();

  const today=todayStr();
  const list=document.getElementById('staffList');

  if(!state.names.length){
    list.innerHTML='<div class="empty-state">No staff members. Add first names above.</div>';
    return;
  }

  list.innerHTML=state.names.map(name=>{
    const dates=(state.late[mk]&&state.late[mk][name])||[];
    const count=dates.length;
    const isLateToday=dates.includes(today);
    const safeId=name.replace(/[^a-zA-Z0-9]/g,'');
    const histHtml=dates.length
      ? dates.slice().sort().map(d=>{
          const dd=new Date(d+'T00:00:00');
          return '<span>'+dd.getDate()+'/'+(dd.getMonth()+1)+'</span>';
        }).join('')
      : '<span style="opacity:.5">No lates this month</span>';

    return `<div class="staff-row">
      <div>
        <div class="staff-name">
          <span class="staff-count ${count>0?'has-late':''}">${count}</span>
          ${name}
        </div>
        ${count>0?`<div class="history-toggle" onclick="toggleHistory('${name}')">view dates</div><div class="history-list" id="hist-${safeId}">${histHtml}</div>`:''}
      </div>
      <div class="staff-actions">
        <div class="late-checkbox ${isLateToday?'checked':''}" onclick="toggleLate('${name}')" title="Late today"></div>
        <button class="btn-del" onclick="removeStaff('${name}')" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');
}

function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeToggle').textContent=isDark?'🌙 Dark':'☀️ Light';
  try{localStorage.setItem('fhbm_theme',isDark?'light':'dark');}catch(e){}
}
try{
  if(localStorage.getItem('fhbm_theme')==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').textContent='☀️ Light';
  }
}catch(e){}

render();
</script>
</body>
</html>
