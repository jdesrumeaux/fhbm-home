<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training — FHBM</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0f11;--paper:#f5f3ef;--cream:#edeae3;--tan:#ddd8cd;
  --mid:#8a8378;--ghost:#b8b2a8;--accent:#1a3a5c;--gold:#b8860b;
  --white:#ffffff;--r:8px;--green:#2d6a4f;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;--serif:'Instrument Serif',Georgia,serif;
}
[data-theme="dark"]{
  --ink:#e8e6e1;--paper:#0f1117;--cream:#1a1d27;--tan:#2a2d3a;
  --mid:#7a7a8a;--ghost:#4a4a5a;--accent:#5b8fd4;--gold:#d4af37;--white:#1a1d27;--green:#4d9b7c;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh}
.page-wrap{max-width:760px;margin:0 auto;padding:36px 24px 60px}
.theme-toggle{position:fixed;top:16px;right:16px;z-index:200;background:var(--cream);border:1px solid var(--tan);border-radius:20px;padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--mid);cursor:pointer;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--mid);text-decoration:none;margin-bottom:20px;}
.back-link:hover{color:var(--accent)}
.brand-row{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.brand-mark{width:44px;height:44px;border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-name{font-family:var(--serif);font-size:26px;font-style:italic;letter-spacing:-.02em;line-height:1}
.brand-sub{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-top:2px}
.card{background:var(--white);border:1px solid var(--tan);border-radius:12px;padding:20px 22px;margin-bottom:14px}
.card-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mid)}
.field input,.field select,.field textarea{
  background:var(--paper);border:1px solid var(--tan);border-radius:var(--r);
  padding:9px 11px;color:var(--ink);font-family:var(--mono);font-size:13px;
  outline:none;transition:border-color .18s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--white);color:var(--ink)}
.field textarea{font-family:var(--sans);resize:vertical}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:10px 18px;
  font-family:var(--mono);font-size:12px;cursor:pointer;width:100%}
.btn-add:hover{opacity:.88}
.msg{font-family:var(--mono);font-size:11px;padding:8px 11px;border-radius:6px;margin-bottom:10px;display:none}
.msg.show{display:block}
.msg-err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);color:#b91c1c}
.msg-ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.22);color:#065f46}
.training-list{display:flex;flex-direction:column;gap:10px}
.training-row{display:flex;align-items:center;justify-content:space-between;background:var(--cream);
  border-radius:10px;padding:14px 16px;gap:12px}
.training-row.past{opacity:.55}
.training-date{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;min-width:78px}
.training-info{flex:1}
.training-theme{font-weight:600;font-size:14px;margin-bottom:2px}
.training-who{font-family:var(--mono);font-size:11px;color:var(--mid)}
.who-pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
  padding:3px 9px;border-radius:14px;background:var(--white);border:1px solid var(--tan);color:var(--mid)}
.btn-del{background:transparent;border:none;color:var(--ghost);font-size:14px;cursor:pointer;padding:2px 6px;}
.btn-del:hover{color:#ef4444}
.empty-state{text-align:center;padding:30px;color:var(--mid)}
.today-badge{background:var(--green);color:#fff;font-family:var(--mono);font-size:9px;
  padding:2px 7px;border-radius:10px;margin-left:8px;letter-spacing:.05em}
.dp-wrap{position:relative}
.dp-input{cursor:pointer}
.dp-cal{position:absolute;top:calc(100% + 4px);left:0;z-index:300;background:var(--white);
  border:1px solid var(--tan);border-radius:10px;padding:12px;box-shadow:0 8px 24px -8px rgba(0,0,0,.18);
  width:240px;display:none}
.dp-cal.show{display:block}
.dp-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dp-cal-title{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink)}
.dp-cal-nav{background:transparent;border:none;color:var(--mid);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.dp-cal-nav:hover{background:var(--cream);color:var(--accent)}
.dp-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-cal-dow{font-family:var(--mono);font-size:9px;color:var(--ghost);text-align:center;padding:4px 0}
.dp-cal-day{font-family:var(--mono);font-size:11px;text-align:center;padding:6px 0;cursor:pointer;
  border-radius:6px;color:var(--ink)}
.dp-cal-day:hover{background:var(--cream)}
.dp-cal-day.muted{color:var(--ghost)}
.dp-cal-day.selected{background:var(--accent);color:#fff}
.dp-cal-day.disabled{color:var(--ghost);cursor:not-allowed;opacity:.4}
.dp-cal-day.disabled:hover{background:transparent}
.dp-month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.dp-month-cell{font-family:var(--mono);font-size:11px;text-align:center;padding:10px 0;cursor:pointer;
  border-radius:6px;color:var(--ink)}
.dp-month-cell:hover{background:var(--cream)}
.dp-month-cell.selected{background:var(--accent);color:#fff}
.dp-month-cell.disabled{color:var(--ghost);cursor:not-allowed;opacity:.4}

</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
<div class="page-wrap">
  <a class="back-link" href="index.html">← Home</a>
  <header class="brand-row">
    <div class="brand-mark">🎓</div>
    <div>
      <div class="brand-name">FHBM</div>
      <div class="brand-sub">Evening Training Planner</div>
    </div>
  </header>

  <section class="card">
    <div class="card-label">Schedule a training</div>
    <div class="msg msg-err" id="err"></div>
    <div class="msg msg-ok" id="okB"></div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="trainDate">
    </div>
    <div class="two-col">
      <div class="field">
        <label>Who</label>
        <select id="trainWho">
          <option value="Julie">Julie</option>
          <option value="Clarissa">Clarissa</option>
          <option value="Luis">Luis</option>
          <option value="Gregor">Gregor</option>
          <option value="Jean">Jean</option>
          <option value="Staff member">Staff member</option>
        </select>
      </div>
      <div class="field">
        <label>Topic</label>
        <input type="text" id="trainTopic" placeholder="5-min training theme…">
      </div>
    </div>
    <button class="btn-add" onclick="addTraining()">+ Schedule training</button>
  </section>

  <section class="card">
    <div class="card-label">Upcoming &amp; past trainings</div>
    <div class="training-list" id="trainingList"></div>
  </section>
</div>

</script>
<script>
const MONTH_NAMES_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_EN=['Su','Mo','Tu','We','Th','Fr','Sa'];

function initDatePicker(inputId, opts){
  opts = opts || {};
  const input = document.getElementById(inputId);
  if(!input) return;
  const wrap = document.createElement('div');
  wrap.className = 'dp-wrap';
  input.parentNode.insertBefore(wrap, input);
  wrap.appendChild(input);
  input.type = 'text';
  input.classList.add('dp-input');
  input.readOnly = true;
  input.placeholder = 'Select date...';

  const cal = document.createElement('div');
  cal.className = 'dp-cal';
  wrap.appendChild(cal);

  let viewDate = new Date();
  let selectedISO = '';

  function fmtISO(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
  function fmtDisplay(y,m,d){
    const dd=new Date(y,m,d);
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return days[dd.getDay()]+' '+d+' '+MONTH_NAMES_EN[m]+' '+y;
  }

  function renderCal(){
    const y=viewDate.getFullYear(), m=viewDate.getMonth();
    const first=new Date(y,m,1);
    const startDow=first.getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const daysInPrev=new Date(y,m,0).getDate();

    cal.innerHTML = '';

    const head = document.createElement('div');
    head.className = 'dp-cal-head';

    const prevBtn = document.createElement('button');
    prevBtn.type = 'button';
    prevBtn.className = 'dp-cal-nav';
    prevBtn.textContent = '\u2039';
    prevBtn.addEventListener('click', e=>{ e.stopPropagation(); viewDate.setMonth(viewDate.getMonth()-1); renderCal(); });

    const title = document.createElement('span');
    title.className = 'dp-cal-title';
    title.textContent = MONTH_NAMES_EN[m]+' '+y;

    const nextBtn = document.createElement('button');
    nextBtn.type = 'button';
    nextBtn.className = 'dp-cal-nav';
    nextBtn.textContent = '\u203a';
    nextBtn.addEventListener('click', e=>{ e.stopPropagation(); viewDate.setMonth(viewDate.getMonth()+1); renderCal(); });

    head.appendChild(prevBtn);
    head.appendChild(title);
    head.appendChild(nextBtn);
    cal.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'dp-cal-grid';

    DOW_EN.forEach(d=>{
      const dowEl = document.createElement('div');
      dowEl.className = 'dp-cal-dow';
      dowEl.textContent = d;
      grid.appendChild(dowEl);
    });

    for(let i=0;i<startDow;i++){
      const dayEl = document.createElement('div');
      dayEl.className = 'dp-cal-day muted';
      dayEl.textContent = daysInPrev-startDow+i+1;
      grid.appendChild(dayEl);
    }

    for(let d=1;d<=daysInMonth;d++){
      const iso = fmtISO(y,m,d);
      const isSelected = iso===selectedISO;
      let disabled = false;
      if(opts.allowedDow){
        const dow = new Date(y,m,d).getDay();
        if(!opts.allowedDow.includes(dow)) disabled = true;
      }
      const dayEl = document.createElement('div');
      dayEl.className = 'dp-cal-day'+(isSelected?' selected':'')+(disabled?' disabled':'');
      dayEl.textContent = d;
      if(!disabled){
        dayEl.addEventListener('click', e=>{
          e.stopPropagation();
          selectedISO = iso;
          input.value = fmtDisplay(y,m,d);
          input.dataset.iso = iso;
          cal.classList.remove('show');
          input.dispatchEvent(new Event('change'));
        });
      }
      grid.appendChild(dayEl);
    }

    cal.appendChild(grid);
  }

  input.addEventListener('click', e=>{
    e.stopPropagation();
    document.querySelectorAll('.dp-cal.show').forEach(c=>{ if(c!==cal) c.classList.remove('show'); });
    cal.classList.toggle('show');
    renderCal();
  });
  document.addEventListener('click', e=>{
    if(!wrap.contains(e.target)) cal.classList.remove('show');
  });

  input.getISO = function(){ return input.dataset.iso || ''; };
  input.setISO = function(iso){
    if(!iso){ input.value=''; input.dataset.iso=''; selectedISO=''; return; }
    const parts = iso.split('-').map(Number);
    const y=parts[0], m=parts[1], d=parts[2];
    selectedISO = iso;
    viewDate = new Date(y, m-1, 1);
    input.value = fmtDisplay(y, m-1, d);
    input.dataset.iso = iso;
  };
  input.clearValue = function(){ input.value=''; input.dataset.iso=''; selectedISO=''; };
}

function initMonthPicker(inputId, opts){
  opts = opts || {};
  const input = document.getElementById(inputId);
  if(!input) return;
  const wrap = document.createElement('div');
  wrap.className = 'dp-wrap';
  input.parentNode.insertBefore(wrap, input);
  wrap.appendChild(input);
  input.type = 'text';
  input.classList.add('dp-input');
  input.readOnly = true;
  input.placeholder = 'Select month...';

  const cal = document.createElement('div');
  cal.className = 'dp-cal';
  wrap.appendChild(cal);

  let viewYear = new Date().getFullYear();
  let selectedKey = '';

  function fmtKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
  function fmtDisplay(y,m){ return MONTH_NAMES_EN[m]+' '+y; }

  function renderCal(){
    cal.innerHTML = '';

    const head = document.createElement('div');
    head.className = 'dp-cal-head';

    const prevBtn = document.createElement('button');
    prevBtn.type = 'button';
    prevBtn.className = 'dp-cal-nav';
    prevBtn.textContent = '\u2039';
    prevBtn.addEventListener('click', e=>{ e.stopPropagation(); viewYear--; renderCal(); });

    const title = document.createElement('span');
    title.className = 'dp-cal-title';
    title.textContent = String(viewYear);

    const nextBtn = document.createElement('button');
    nextBtn.type = 'button';
    nextBtn.className = 'dp-cal-nav';
    nextBtn.textContent = '\u203a';
    nextBtn.addEventListener('click', e=>{ e.stopPropagation(); viewYear++; renderCal(); });

    head.appendChild(prevBtn);
    head.appendChild(title);
    head.appendChild(nextBtn);
    cal.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'dp-month-grid';

    for(let m=0;m<12;m++){
      const key = fmtKey(viewYear,m);
      const isSelected = key===selectedKey;
      let disabled = false;
      if(opts.minKey && key < opts.minKey) disabled = true;
      const cellEl = document.createElement('div');
      cellEl.className = 'dp-month-cell'+(isSelected?' selected':'')+(disabled?' disabled':'');
      cellEl.textContent = MONTH_NAMES_EN[m].slice(0,3);
      if(!disabled){
        cellEl.addEventListener('click', e=>{
          e.stopPropagation();
          selectedKey = key;
          input.value = fmtDisplay(viewYear,m);
          input.dataset.iso = key;
          cal.classList.remove('show');
          input.dispatchEvent(new Event('change'));
        });
      }
      grid.appendChild(cellEl);
    }

    cal.appendChild(grid);
  }

  input.addEventListener('click', e=>{
    e.stopPropagation();
    document.querySelectorAll('.dp-cal.show').forEach(c=>{ if(c!==cal) c.classList.remove('show'); });
    cal.classList.toggle('show');
    renderCal();
  });
  document.addEventListener('click', e=>{
    if(!wrap.contains(e.target)) cal.classList.remove('show');
  });

  input.getISO = function(){ return input.dataset.iso || ''; };
  input.setISO = function(key){
    if(!key){ input.value=''; input.dataset.iso=''; selectedKey=''; return; }
    const parts = key.split('-').map(Number);
    const y=parts[0], m=parts[1];
    selectedKey = key;
    viewYear = y;
    input.value = fmtDisplay(y, m-1);
    input.dataset.iso = key;
  };
  input.clearValue = function(){ input.value=''; input.dataset.iso=''; selectedKey=''; };
}

</script>
<script>
function todayStr(){ return new Date().toISOString().split('T')[0]; }

function loadTrainings(){
  try{ return JSON.parse(localStorage.getItem('fhbm_trainings')||'[]'); }catch(e){ return []; }
}
function saveTrainings(arr){
  try{
    localStorage.setItem('fhbm_trainings', JSON.stringify(arr));
    localStorage.setItem('fhbm_trainings_updated', new Date().toISOString());
  }catch(e){}
}

let trainings = loadTrainings();

function addTraining(){
  const date = document.getElementById('trainDate').getISO();
  const who = document.getElementById('trainWho').value;
  const topic = document.getElementById('trainTopic').value.trim();

  hideMsg();
  if(!date){ showErr('Pick a date.'); return; }
  if(!topic){ showErr('Enter a topic.'); return; }
  if(trainings.find(t=>t.date===date)){
    showErr('A training is already scheduled on '+formatDate(date)+'.');
    return;
  }

  trainings.push({date, who, topic});
  trainings.sort((a,b)=>a.date.localeCompare(b.date));
  saveTrainings(trainings);

  document.getElementById('trainDate').clearValue();
  document.getElementById('trainTopic').value='';
  showOk('Training scheduled for '+formatDate(date)+'.');
  render();
}

function removeTraining(date){
  if(!confirm('Remove the training on '+formatDate(date)+'?')) return;
  trainings = trainings.filter(t=>t.date!==date);
  saveTrainings(trainings);
  render();
}

function formatDate(d){
  const dd = new Date(d+'T00:00:00');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[dd.getDay()]+' '+dd.getDate()+'/'+(dd.getMonth()+1)+'/'+dd.getFullYear();
}

function showErr(m){ const e=document.getElementById('err'); e.textContent=m; e.classList.add('show'); document.getElementById('okB').classList.remove('show'); }
function showOk(m){ const o=document.getElementById('okB'); o.textContent='✅ '+m; o.classList.add('show'); document.getElementById('err').classList.remove('show'); }
function hideMsg(){ document.getElementById('err').classList.remove('show'); document.getElementById('okB').classList.remove('show'); }

function render(){
  const list = document.getElementById('trainingList');
  const today = todayStr();

  // disable already-taken dates is handled at add-time; here just render list
  if(!trainings.length){
    list.innerHTML = '<div class="empty-state">No trainings scheduled yet.</div>';
    return;
  }

  list.innerHTML = trainings.map(t=>{
    const isPast = t.date < today;
    const isToday = t.date === today;
    return `<div class="training-row ${isPast?'past':''}">
      <div class="training-date">${formatDate(t.date)}${isToday?'<span class="today-badge">TODAY</span>':''}</div>
      <div class="training-info">
        <div class="training-theme">${esc(t.topic)}</div>
        <div class="training-who"><span class="who-pill">${esc(t.who)}</span></div>
      </div>
      <button class="btn-del" onclick="removeTraining('${t.date}')" title="Remove">✕</button>
    </div>`;
  }).join('');
}

function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeToggle').textContent=isDark?'🌙 Dark':'☀️ Light';
  try{localStorage.setItem('fhbm_theme',isDark?'light':'dark');}catch(e){}
}
try{
  if(localStorage.getItem('fhbm_theme')==='dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').textContent='☀️ Light';
  }
}catch(e){}

initDatePicker('trainDate');
document.getElementById('trainDate').setISO(todayStr());
render();
</script>
</body>
</html>
